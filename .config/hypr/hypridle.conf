general {
    lock_cmd = pidof hyprlock || hyprlock       # command to run when locking
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # turn on screen after sleep
}

listener {
    timeout = 600                               # 10 min
    on-timeout = loginctl lock-session          # lock screen
}

listener {
    timeout = 900                               # 15 min
    on-timeout = hyprctl dispatch dpms off      # screen off
    on-resume = hyprctl dispatch dpms on        # screen on
}

listener {
    timeout = 1800                              # 30 min
    on-timeout = systemctl suspend              # suspend
}
