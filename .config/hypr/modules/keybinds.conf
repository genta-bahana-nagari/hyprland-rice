$mainMod = SUPER

###############
# Apps / Core #
###############
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, C, exec, $code
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, exec, command postman
bind = $mainMod, N, exec, swaync-client -t
bind = $mainMod SHIFT, N, exec, $wifiManager
bind = $mainMod CTRL, N, exec, $wifiDisconnect

###############
# Window Mgmt #
###############
bind = $mainMod, Q, killactive,
bind = SUPER SHIFT, Delete, exec, $rofiLogout
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaperswitch.sh
# bind = $mainMod SHIFT, Q, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

bindd = $mainMod, M, maximize window, fullscreen, 1
bind = $mainMod, SPACE, togglefloating,
bind = $mainMod SHIFT, P, pseudo,

bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod SHIFT, W, exec, pgrep waybar && pkill waybar || waybar


###############
# Focus Mgmt  #
###############
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d


#################
# Resize Window #
#################
binded = $mainMod SHIFT, left, resize left (-50), resizeactive, -50 0
binded = $mainMod SHIFT, right, resize right (+50), resizeactive, 50 0
binded = $mainMod SHIFT, up, resize up (-50), resizeactive, 0 -50
binded = $mainMod SHIFT, down, resize down (+50), resizeactive, 0 50

######################
# Move & Swap Window #
######################
bind = $mainMod CTRL, left, movewindow, l 
bind = $mainMod CTRL, right, movewindow, r 
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d

bindd = $mainMod ALT, left, swap window left, swapwindow, l
bindd = $mainMod ALT, right, swap window right, swapwindow, r
bindd = $mainMod ALT, up, swap window up, swapwindow, u
bindd = $mainMod ALT, down, swap window down, swapwindow, d

###############
# Workspaces  #
###############
# Switch
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

###############
# Special WS  #
###############
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

###############
# Mouse       #
###############
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

##########################
# Media and Screen Keys  #
##########################
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bind = SUPER, V, exec, cliphist list | rofi -dmenu -display-columns 2 -p "Cliboard" -theme ~/.config/rofi/styles/simple.rasi | cliphist decode | wl-copy

###############
# Media Ctrl  #
###############
bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous

###############
# Screenshot  #
###############
$screenshot_dir = ~/Pictures/Screenshots

bind = $mainMod, Print, exec, mkdir -p $screenshot_dir && hyprshot -m output -o $screenshot_dir
bind = $mainMod SHIFT, Print, exec, mkdir -p $screenshot_dir && hyprshot -m region -o $screenshot_dir
bind = $mainMod CTRL, Print, exec, mkdir -p $screenshot_dir && hyprshot -m window -o $screenshot_dir